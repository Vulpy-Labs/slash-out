name: Create PR Summary

on:
  pull_request:
    types: [opened, reopened, synchronize]

  workflow_dispatch:

env:
  SUMMARY_PLACEHOLDER: '[Summary Placeholder: _"beep beep boop boop"_]'

jobs:
  generate-summary:
    # Test with slim later
    runs-on: ubuntu-latest

    permissions:
      models: read
      contents: read
      pull-requests: write

    steps:
      - name: Checkout To PR Code
        uses: actions/checkout@v4

      - name: Fetch PR
        id: fetch-pr
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });

              return data;
            } catch (error) {
              throw new Error(`Error fetching pull request: ${error.message}`);
            }

      - name: Check If Needs To Create Summary
        id: check-pr-description
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { body } = ${{ steps.fetch-pr.outputs.result }};
              const hasSummary = !body.includes(process.env.SUMMARY_PLACEHOLDER);

              if (hasSummary) {
                console.log('PR Summary already exists.');

                core.setOutput('should-skip', 'true');
              }
            } catch (error) {
               console.log(`Error while searching for placeholder: ${error.message}`);
            }

      - name: Exiting Workflow If Needed
        if: steps.check-pr-description.outputs.should-skip == 'true'
        run: |
          echo "Finishing workflow execution..."
          exit 0

      - name: Fetch PR Diff
        id: fetch-pr-diff
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const pr_diff = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                mediaType: {
                  format: 'diff'
                }
              });

              return pr_diff.data;
            } catch (error) {
              throw new Error(`Error fetching PR Diff: ${error.message}`);
            };

      - name: Generate PR Summary
        id: inference-summary
        uses: actions/ai-inference@v2.0.6
        with:
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt-file: "./.github/workflows/prompts/pr-summary.prompt.md"
          prompt: |
            Here is the PR Diff to analyze: ${{ steps.fetch-pr-diff.outputs.result }}

      - name: Print Results
        run: |
          echo "Response saved to: ${{ steps.inference-summary.outputs.response-file }}"
          echo "response: "
          cat "${{ steps.inference-summary.outputs.response-file }}"

      - name: Update PR Description
        env:
          NEW_SUMMARY: ${{ steps.inference-summary.outputs.response }}
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { body } = ${{ steps.fetch-pr.outputs.result }};
              const newBody = body.replace(process.env.SUMMARY_PLACEHOLDER, process.env.NEW_SUMMARY);

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: newBody
              });

            } catch (error) {
              throw new Error(`Error updating description: ${error.message}`);
            };
