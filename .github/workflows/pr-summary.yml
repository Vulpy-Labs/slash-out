name: Create PR Summary

on:
  pull_request:
    types: [opened, reopened, synchronize]

  workflow_dispatch:
    inputs:
      pull_number:
        description: Pull request number to summarize
        required: true

env:
  PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pull_number || github.event.pull_request.number }}
  AI_SUMMARY_START: '<!-- AI-SUMMARY-START -->'
  AI_SUMMARY_END: '<!-- AI-SUMMARY-END -->'
  SKIPPABLE_EXTENSIONS: '[".excalidraw"]'

jobs:
  check-if-needs-summary:
    runs-on: ubuntu-slim

    permissions:
      contents: read
      pull-requests: read

    outputs:
      PR_DATA: ${{ steps.fetch-pr.outputs.result }}
      PR_FILES: ${{ steps.should-summarize.outputs.files }}
      SHOULD_SUMMARIZE: ${{ steps.should-summarize.outputs.result }}

    steps:
      - name: Checkout To PR Code
        uses: actions/checkout@v4

      - name: Fetch PR
        id: fetch-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pullNumber = Number(process.env.PR_NUMBER);
            if (!Number.isInteger(pullNumber) || pullNumber <= 0) {
              throw new Error(`Invalid PR number: "${process.env.PR_NUMBER}". Must be a positive integer.`);
            }

            try {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
              });

              return data;
            } catch (error) {
              throw new Error(`Error fetching pull request: ${error.message}`);
            }

      - name: Check If Should Create Summary
        id: should-summarize
        env:
          PR_DATA: ${{ steps.fetch-pr.outputs.result }}
        uses: actions/github-script@v7
        with:
          script: |
            const skippableExtensions = JSON.parse(process.env.SKIPPABLE_EXTENSIONS);

            try {
              const { body = "" } = JSON.parse(process.env.PR_DATA);
              const hasSentinels = body.includes(process.env.AI_SUMMARY_START) && body.includes(process.env.AI_SUMMARY_END);

              if (!hasSentinels) {
                console.log('Summary sentinels not found. Skipping.');
                return false;
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(process.env.PR_NUMBER),
                per_page: 100,
              });

              if (files.length === 0) {
                console.log('PR has no changed files. Skipping summary.');
                return false;
              }

              const allSkippable = files.every(({ filename }) =>
                skippableExtensions.some((ext) => filename.endsWith(ext))
              );

              if (allSkippable) {
                console.log('PR only contains skippable files. Skipping summary.');
                return false;
              }

              const trimmedFiles = files.map(({ filename, patch }) => ({ filename, patch }));
              core.setOutput('files', JSON.stringify(trimmedFiles));
              console.log('Sentinels found and PR has non-skippable files. Summary will be created.');
              return true;
            } catch (error) {
              throw new Error(`Error while deciding if summary should be created: ${error.message}`);
            }

  generate-summary:
    needs: check-if-needs-summary
    if: needs.check-if-needs-summary.outputs.SHOULD_SUMMARIZE == 'true'

    runs-on: ubuntu-slim

    permissions:
      models: read
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch PR Diff
        id: fetch-pr-diff
        env:
          PR_FILES: ${{ needs.check-if-needs-summary.outputs.PR_FILES }}
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const skippableExtensions = JSON.parse(process.env.SKIPPABLE_EXTENSIONS);
            const isSkippable = (file) => skippableExtensions.some(ext => file.filename.endsWith(ext));

            const files = JSON.parse(process.env.PR_FILES);

            const skipped = files.filter(isSkippable).map(f => f.filename);
            const diff = files
              .filter(f => !isSkippable(f))
              .map(f => {
                if (!f.patch) {
                  console.warn(`No patch available for ${f.filename} — it may be binary or too large. Skipping.`);
                  return '';
                }
                return `--- a/${f.filename}\n+++ b/${f.filename}\n${f.patch}`;
              })
              .join('\n');

            const skippedNote = skipped.length > 0
              ? `The following files were skipped because their type is not supported for analysis:\n${skipped.join('\n')}`
              : '';

            core.setOutput('skipped-note', skippedNote);
            return diff;

      - name: Generate PR Summary
        id: inference-summary
        uses: actions/ai-inference@v2.0.6
        with:
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          model: openai/gpt-4o
          max-tokens: 4096
          system-prompt-file: "./.github/workflows/prompts/pr-summary.prompt.md"
          prompt: |
            Here is the PR Diff to analyze: ${{ steps.fetch-pr-diff.outputs.result }}
            ${{ steps.fetch-pr-diff.outputs.skipped-note }}

      - name: Update PR Description
        env:
          PR_DATA: ${{ needs.check-if-needs-summary.outputs.PR_DATA }}
          NEW_SUMMARY: ${{ steps.inference-summary.outputs.response }}
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { body = "" } = JSON.parse(process.env.PR_DATA);
              const summary = process.env.NEW_SUMMARY
                .replaceAll(process.env.AI_SUMMARY_START, '')
                .replaceAll(process.env.AI_SUMMARY_END, '');

              const newBody = body.replace(
                new RegExp(`${process.env.AI_SUMMARY_START}[\\s\\S]*?${process.env.AI_SUMMARY_END}`),
                () => `${process.env.AI_SUMMARY_START}\n${summary}\n${process.env.AI_SUMMARY_END}`
              );

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(process.env.PR_NUMBER),
                body: newBody
              });

            } catch (error) {
              throw new Error(`Error updating description: ${error.message}`);
            };
